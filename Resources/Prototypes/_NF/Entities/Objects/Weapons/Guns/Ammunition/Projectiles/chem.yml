# Base
- type: entity
  parent: [SolutionCryo, BulletWaterShot] # Aurora's Song - Add SolutionCryo
  id: SplatterChemBase
  name: chemical splatter
  categories: [ HideSpawnMenu ]
  components:
  - type: Ammo
    muzzleFlash: null
  - type: TimedDespawn
    lifetime: 10
  - type: Projectile
    damage:
      types:
        Blunt: 0
  - type: Sprite
    sprite: Objects/Weapons/Guns/Projectiles/water_shot.rsi
    layers:
    - state: icon
      map: ["enum.VaporVisualLayers.Base"]
  - type: RefillableSolution
    solution: vapor
  - type: DrainableSolution
    solution: vapor
  - type: SolutionInjectOnEmbed
    transferAmount: 60 # Aurora's Song - 50>60
    solution: vapor # Aurora's Song - melee>vapor
  - type: InjectableSolution
    solution: vapor
  - type: Vapor
    active: true
  - type: Appearance
  - type: VaporVisuals

# Syndicate Chemwarrior Projectiles
- type: entity
  parent: SplatterChemBase
  id: SplatterChemPhlogNapalm
  categories: [ HideSpawnMenu ]
  components:
  - type: Solution # Aurora's Song - Convert to solution
    solution:
      reagents:
      - ReagentId: Napalm
        Quantity: 1
      - ReagentId: Phlogiston
        Quantity: 1
      - ReagentId: ChlorineTrifluoride
        Quantity: 1
      - ReagentId: Laughter
        Quantity: 4

- type: entity
  parent: SplatterChemBase
  id: SplatterChemDrugs
  categories: [ HideSpawnMenu ]
  components:
  - type: Solution # Aurora's Song - Convert to solution
    solution:
      reagents:
      - ReagentId: THC
        Quantity: 5
      - ReagentId: PolytrinicAcid
        Quantity: 1
      - ReagentId: Razorium
        Quantity: 1

- type: entity
  parent: SplatterChemBase
