  - type: Solution # Aurora's Song - Convert to solution
    solution:
      reagents:
      - ReagentId: MuteToxin
        Quantity: 4
      - ReagentId: PolytrinicAcid
        Quantity: 1
      - ReagentId: ChloralHydrate
        Quantity: 1

- type: entity
  parent: SplatterChemBase
  id: SplatterChemWeh
  categories: [ HideSpawnMenu ]
  components:
  - type: Solution # Aurora's Song - Convert to solution
    solution:
      reagents:
