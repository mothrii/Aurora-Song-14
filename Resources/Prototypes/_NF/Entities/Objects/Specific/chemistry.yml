- type: entity
  parent: Dropper
  description: Used to transfer small amounts of a specified reagent between containers.
  name: service selective dropper
  id: ServiceSelectiveDropper
  components:
  - type: Sprite
    sprite: _NF/Objects/Specific/Chemistry/dropper.rsi
    layers:
      - state: dropper
      - state: dropper1
        map: ["enum.SolutionContainerLayers.Fill"]
        visible: false
  - type: Item
    sprite: _NF/Objects/Specific/Chemistry/dropper.rsi
  # Aurora's Song - Inheritance
#  - type: Injector
#    transferAmount: 5
#    toggleState: Draw
  - type: Tag
    tags:
    - Syringe
  - type: UserInterface
    interfaces:
      enum.ReagentWhitelistChangeUIKey.Key:
        type: ChangeReagentWhitelistBoundUserInterface
  - type: ReagentWhitelistChange
    allowedReagentGroup:
      - Foods
      - Botanical
      - Drinks
  - type: StaticPrice
    price: 30

- type: entity
  name: bluespace vial
  parent: BaseBeakerMetallic
  id: VialBluespace
  description: A vial device created with bluespace technology.
  components:
  - type: Tag
    tags:
    - CentrifugeCompatible
  - type: Sprite
    sprite: _NF/Objects/Specific/Chemistry/vial_bluespace.rsi
    layers:
      - state: vialbluespace
      - state: vialbluespace-1
        map: ["enum.SolutionContainerLayers.Fill"]
        visible: false
  - type: SolutionContainerVisuals
    maxFillLevels: 6
    fillBaseName: vial-1-
    inHandsMaxFillLevels: 4
    inHandsFillBaseName: -fill-
  - type: SolutionContainerManager
    solutions:
      beaker:
        maxVol: 300
  - type: SolutionTransfer
    maxTransferAmount: 300
  - type: Item
    size: Tiny
    sprite: _NF/Objects/Specific/Chemistry/vial_bluespace.rsi
  - type: StaticPrice
    price: 100
    vendPrice: 100

- type: entity
  name: medical pouch
  id: MedicalPouch
  parent: [ PillCanister, BaseBagOpenClose ]
  description: Holds up to 12 tiny medical items.
  components:
  - type: Item
    size: Small
    sprite: _AS/Objects/Specific/Chemistry/medical_pouch.rsi # Aurora's Song - resprite
  - type: Sprite
    sprite: _AS/Objects/Specific/Chemistry/medical_pouch.rsi # Aurora's Song - resprite
    layers:
    - state: closed
      map: ["closeLayer"]
    - state: open
      map: ["openLayer"]
      visible: false
    - state: fill-1 # Begin Aurora's Song - add fill visuals
      map: [ "pouchFill1" ]
      visible: false
    - state: fill-2
      map: [ "pouchFill2" ]
      visible: false
    - state: fill-3
      map: [ "pouchFill3" ]
      visible: false
    - state: fill-4
      map: [ "pouchFill4" ]
      visible: false
    - state: fill-5
      map: [ "pouchFill5" ]
      visible: false
    - state: fill-6
      map: [ "pouchFill6" ]
      visible: false
    - state: fill-7
      map: [ "pouchFill7" ]
      visible: false
    - state: fill-8
      map: [ "pouchFill8" ]
      visible: false
  - type: ItemCounter
    count:
      components: [ Item ]
    composite: true
    layerStates:
    - pouchFill1
    - pouchFill2
    - pouchFill3
    - pouchFill4
    - pouchFill5
    - pouchFill6
    - pouchFill7
    - pouchFill8
  - type: Appearance
  - type: GenericVisualizer
    visuals:
      enum.SharedBagOpenVisuals.BagState:
        closeLayer:
          Open: { visible: false }
          Closed: { visible: true }
        openLayer:
          Open: { visible: true }
          Closed: { visible: false }
        insideLayer:
          Open: { visible: true }
          Closed: { visible: false } # End Aurora's Song - add fill visuals
  - type: Storage
    grid:
    - 0,0,3,2
    whitelist:
      tags:
      - Pill
      - Bottle
      - CentrifugeCompatible # Frontier: Vial > CentrifugeCompatible
      - Syringe
      components:
      - Injector # Aurora's Song - Hypospray>Injector

- type: entity
  name: corpsman's medical pouch
  id: CorpsmanMedicalPouch
  parent: [ MedicalPouch, BaseC3SyndicateContraband] # Frontier: BaseSyndicateContraband > BaseC3SyndicateContraband
  description: Holds up to 15 tiny medical items.
  components:
  - type: Item
    sprite: _AS/Objects/Specific/Chemistry/corpsman_medical_pouch.rsi # Aurora's Song - resprite
  - type: Sprite
    sprite: _AS/Objects/Specific/Chemistry/corpsman_medical_pouch.rsi # Aurora's Song - resprite
  - type: Storage
    grid:
    - 0,0,4,2 #syndie stuffs always bigger
