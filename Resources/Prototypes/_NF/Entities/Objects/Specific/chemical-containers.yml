- type: entity
  name: reinforced jug
  parent: [SolutionHuge, Jug] # Aurora's Song - Convert to solution
  id: ReinforcedJug
  description: The sterile plastic of this jug has been reinforced with a metallic shell allowing it to contain an impressive amount of liquid.
  components:
  - type: SolutionContainerVisuals
    inHandsMaxFillLevels: 4
  - type: Sprite
    sprite: _NF/Objects/Specific/Chemistry/reinforced_jug.rsi
    layers:
    - state: icon
    - state: stopper
      visible: true
      map: ["enum.OpenableVisuals.Layer"]
    - state: fill-1
      map: [ "enum.SolutionContainerLayers.Fill" ]
      visible: false
  - type: Item
    size: Large
    shape:
    - 0,0,3,3 # Aurora's Song - Make larger for solution refactor
    sprite: _NF/Objects/Specific/Chemistry/reinforced_jug.rsi
    inhandVisuals:
      left:
      - state: inhand-left
      - state: inhand-left-fill-1
        map: [ "enum.SolutionContainerLayers.Fill" ]
        visible: false
      right:
      - state: inhand-right
      - state: inhand-right-fill-1
        map: [ "enum.SolutionContainerLayers.Fill" ]
        visible: false
  - type: Openable
    sound:
      collection: bottleOpenSounds
    closeable: true
    closeSound:
      collection: bottleCloseSounds
  - type: StaticPrice
    price: 30 # Consistent with BaseBeakerMetallic
  - type: Destructible # Hacky - takes damage, but shouldn't be destructible
    thresholds: []
  - type: GenericVisualizer
    visuals:
      enum.OpenableVisuals.Opened:
        enum.OpenableVisuals.Layer:
          True: { visible: false }
          False: { visible: true }

- type: entity
  name: bluespace jug
  parent: [Solution3840, Jug] # Aurora's Song - Use Solution3840
  id: JugBluespace
  description: Uses bluespace technology to contain an impossible amount of liquid.
  components:
  - type: Sprite
    sprite: _NF/Objects/Specific/Chemistry/jug_bluespace.rsi
    layers:
      - state: jug
      - state: jug-unlit
        shader: unshaded
      - state: fill-1
        map: [ "enum.SolutionContainerLayers.Fill" ]
        visible: false
  - type: Item
    sprite: _NF/Objects/Specific/Chemistry/jug_bluespace.rsi
    inhandVisuals:
      left:
      - state: inhand-left
      - state: inhand-left-unlit
        shader: unshaded
      - state: inhand-left-fill-1
        map: [ "enum.SolutionContainerLayers.Fill" ]
        visible: false
      right:
      - state: inhand-right
      - state: inhand-right-unlit
        shader: unshaded
      - state: inhand-right-fill-1
        map: [ "enum.SolutionContainerLayers.Fill" ]
        visible: false
  - type: SolutionTransfer # Aurora Song: Max transfer to 1k
    canChangeTransferAmount: true
    maxTransferAmount: 1000
  - type: StaticPrice
    price: 30 # Consistent with BaseBeakerMetallic
  - type: Destructible # Hacky - takes damage, but shouldn't be destructible
    thresholds: []

# Frontier: an unspillable jug for welding fuel.
- type: entity
  name: jerry can
  parent: [SolutionBeaker, SolutionLarge, BaseItem] # Aurora's Song - Convert to solution
  id: JerryCan
  description: A plastic jerry can with a spill-proof nozzle.
  components:
  - type: Sprite
    sprite: _NF/Objects/Specific/Chemistry/jerrycan.rsi
    layers:
    - state: jerrycan
    - state: jerrycan1
      map: [ "enum.SolutionContainerLayers.Fill" ]
      visible: false
  - type: Item
    size: Normal
    sprite: _NF/Objects/Specific/Chemistry/jerrycan.rsi
  - type: MixableSolution
    solution: beaker
  - type: RefillableSolution
    solution: beaker
  - type: DrainableSolution
    solution: beaker
  - type: ExaminableSolution
    solution: beaker
  - type: DrawableSolution
    solution: beaker
  - type: InjectableSolution
    solution: beaker
  - type: SolutionTransfer
    canChangeTransferAmount: true
  - type: SolutionItemStatus
    solution: beaker
  - type: UserInterface
    interfaces:
      enum.TransferAmountUiKey.Key:
        type: TransferAmountBoundUserInterface
  - type: Edible  # Aurora's Song - Convert to edible from Drink
    edible: Drink
    solution: beaker
    delay: 1.5
    forceFeedDelay: 5
    destroyOnEmpty: false # Aurora's Song: DO NOT EAT IT
  - type: Appearance
  - type: SolutionContainerVisuals
    maxFillLevels: 5
    fillBaseName: jerrycan
    inHandsMaxFillLevels: 5
    inHandsFillBaseName: -fill-
  - type: StaticPrice
    price: 10
  - type: Injurable # Aurora's Song - Extract damageContainer to Injurable
    damageContainer: Inorganic
  - type: Destructible
    thresholds:
    - trigger:
        !type:DamageTrigger
        damage: 200
      behaviors:
        - !type:DoActsBehavior
          acts: [ "Destruction" ]
    - trigger:
        !type:DamageTrigger
        damage: 20
      behaviors:
      - !type:PlaySoundBehavior
        sound:
          collection: MetalBreak
          params:
            volume: -4
#      - !type:SpillBehavior { } # Aurora's Song - "Unspillable?"
      - !type:SpawnEntitiesBehavior
        spawn:
          SheetPlastic1:
            min: 0
            max: 1
        transferForensics: true
      - !type:DoActsBehavior
        acts: [ "Destruction" ]
  - type: Label
  - type: TrashOnSolutionEmpty
    solution: beaker

- type: entity
  parent: JerryCan
  suffix: welding fuel
  id: JerryCanWeldingFuel
#  categories: [ HideSpawnMenu ] # Frontier
  components:
  - type: Label
    currentLabel: reagent-name-welding-fuel
  - type: Solution # Aurora's Song - Convert to solution
    solution:
      reagents:
      - ReagentId: WeldingFuel
        Quantity: 240
  - type: StaticPrice
    vendPrice: 500
  - type: NFFuel

