- type: entity
  parent: AtmosDeviceFanDirectional
  id: PoweredAtmosDeviceFanDirectional
  name: directional fan
  suffix: Powered
  description: A thin fan, stopping the movement of gases across it.
  placement:
    mode: SnapgridCenter
  components:
  - type: Physics
    bodyType: Static
  - type: Pullable
  - type: Rotatable
    increment: 90
  - type: ApcPowerReceiver
    powerLoad: 1000
  - type: ExtensionCableReceiver
  - type: Anchorable
  - type: Airtight
    airBlocked: false
    requiresPower: true
  - type: Battery
    netsync: false
    maxCharge: 10000
    startingCharge: 10000
  - type: ApcPowerReceiverBattery
    idleLoad: 1000
    batteryRechargeRate: 200
    batteryRechargeEfficiency: 0.0
  - type: ExaminableBattery
