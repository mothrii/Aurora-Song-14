- type: entity
  parent: [SolutionCryo, Recycler] #too different so different parent
  id: ASReagentGrinderIndustrialBluespace
  name: bluespace industrial reagent grinder
  description: Have we dreamed too large? Oceans may be contained within this reagent grinder, vast expanses of chemicals.
  components:
  - type: Solution
    solution:
      maxVol: 38400 #For deranged people # 3840x10
  - type: MaterialReclaimer
    whitelist:
      components:
      - Extractable #same as reagent grinder
    blacklist:
      tags:
      - HighRiskItem
    efficiency: 0.9
    onlyReclaimDrainable: false
    solutionContainerId: solution
    reclaimMaterials: false # Dix material duplication
  - type: Sprite
    sprite: _AS/Structures/Machines/recycling.rsi
    layers:
      - state: grinder-b0
  - type: Machine
    board: ASBluespaceReagentGrinderIndustrialMachineCircuitboard
  - type: GenericVisualizer
    visuals:
      enum.ConveyorVisuals.State:
        enum.ConveyorState.Off:
          Forward: { state: grinder-b1 }
          Reverse: { state: grinder-b1 }
          Off: { state: grinder-b0 }
  - type: ContainerContainer
    containers:
      machine_board: !type:Container
      machine_parts: !type:Container
  - type: Construction
    graph: Machine
    node: machine
    containers:
    - machine_parts
    - machine_board
  - type: DrainableSolution
    solution: solution
  - type: ExaminableSolution
    solution: solution
