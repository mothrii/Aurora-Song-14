      path: /Audio/Weapons/Guns/Gunshots/laser_cannon.ogg
  - type: BatteryAmmoProvider
    proto: ASBulletLaserMagnum
    fireCost: 140
  - type: BatteryWeaponFireModes
    fireModes:
    - proto: ASBulletLaserMagnum
      fireCost: 140 # 2 seconds to regen per shot in this mode
    - proto: ASBulletLaserWindowPiercingMagnum
      fireCost: 140 # 2 seconds to regen per shot in this mode
    - proto: NFBulletDisabler
      fireCost: 80 # 1.1428 seconds to regen per shot in this mode
      pacifismAllowedMode: true
  - type: BatterySelfRecharger
    autoRechargeRate: 70
    autoRechargePauseTime: 6
