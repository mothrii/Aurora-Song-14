  parent: [ ASBaseWeaponManufacturerNanoTrasen, ASBaseWeaponFrameEnergyPistolHighCap, BaseC3NanoTrasenContraband]
  name: Mk.II charon magnum
  suffix: Aurora's Song
  description: |-
    Multiple fire modes, a sleek chassis, the Mk.II charon is an effective attempt to miniaturise the firing system of the energy shotgun and specialise it for new enagement profiles.
  components:
  - type: Sprite
    sprite: Objects/Weapons/Guns/Battery/energy_magnum.rsi
    layers:
    - state: base
      map: [ "enum.GunVisualLayers.Base" ]
    - state: mag-unshaded-1
      visible: false
      map: [ "enum.GunVisualLayers.MagUnshaded" ]
      shader: unshaded
  - type: MagazineVisuals
    magState: mag
    steps: 4
    zeroVisible: true
  - type: Appearance
  - type: Clothing
    sprite: Objects/Weapons/Guns/Battery/energy_magnum.rsi
