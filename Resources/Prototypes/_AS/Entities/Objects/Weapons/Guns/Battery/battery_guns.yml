- type: entity
  id: ASBaseWeaponPowerCell
  parent: BaseItem
  abstract: true
  components:
  - type: Sprite
  - type: Item
    size: Huge
  - type: AmmoCounter
  - type: Gun
    fireRate: 2
    selectedMode: SemiAuto
    availableModes:
    - SemiAuto
    soundGunshot:
      path: /Audio/_AS/Weapons/Guns/Gunshots/LasCrack_Samp4.ogg
  - type: BatteryAmmoProvider
    proto: ASLasBoltHeavy
    fireCost: 60
  - type: ItemSlots
    slots:
      cell_slot:
        name: Magazine
        startingItem: PowerCellMedium
        insertSound: /Audio/Weapons/Guns/MagIn/batrifle_magin.ogg
        ejectSound: /Audio/Weapons/Guns/MagOut/batrifle_magout.ogg
        whitelist:
          tags:
          - PowerCellSmall
          - PowerCellMedium
          - PowerCellHigh
          - PowerCellHyper
        blacklist:
          tags:
          - PowerCellAntique
          - PowerCellFusion
  - type: PowerCellSlot
    cellSlotId: cell_slot
  - type: Appearance
  - type: StaticPrice
    price: 500
  - type: ContainerContainer
    containers:
      cell_slot: !type:ContainerSlot

- type: entity
  id: ASBaseWeaponEnergyPistolFireModesMagnum
  abstract: true
  components:
  - type: Sprite
    layers:
    - state: base
      map: [ "enum.GunVisualLayers.Base" ]
    - state: mode-disabler
      map: [ "Firemode" ]
      shader: unshaded
    - state: mag-unshaded-4
      map: [ "enum.GunVisualLayers.MagUnshaded" ]
      shader: unshaded
  - type: Battery
    maxCharge: 1005
    startingCharge: 1005
  - type: BatteryAmmoProvider
    proto: NFBulletDisabler
    fireCost: 50
  - type: Gun
    soundGunshot:
      path: /Audio/Weapons/Guns/Gunshots/laser_cannon.ogg
    soundEmpty:
      path: /Audio/_DV/Weapons/Guns/Empty/dry_fire.ogg
  - type: EnergyGun
    fireModes:
    - proto: NFBulletDisabler
      fireCost: 50
      name: disabling
      state: disabler
    - proto: BulletEnergyGunMagnum
      fireCost: 100
      name: lethal
      state: lethal
  - type: MagazineVisuals
    magState: mag
    steps: 5
    zeroVisible: true
  - type: Appearance
  - type: GenericVisualizer
    visuals:
      enum.EnergyGunFireModeVisuals.State:
        Firemode:
          Disabler: { state: mode-disabler }
          Lethal: { state: mode-lethal }


# region - battery rifle frames | Aurora Song
- type: entity
  id: ASBaseWeaponFrameBatteryRifle
  parent: [ NFBaseWeaponEncumbranceRifle, ASBaseWeaponPowerCell ]
  suffix: Aurora Song
  abstract: true
  components:
  - type: Sprite
    layers:
    - state: base
      map: ["enum.GunVisualLayers.Base"]
  - type: Appearance
  - type: Wieldable
    unwieldOnUse: false
  - type: GunRequiresWield
  - type: GunWieldBonus
    minAngle: -0 # Set to 0 because GunRequiresWield
    maxAngle: -0
  - type: Gun
    projectileSpeed: 30
    minAngle: 2
    maxAngle: 3.8
    angleIncrease: 0.7
    angleDecay: 1.5
    fireRate: 3
    selectedMode: SemiAuto
    availableModes:
    - SemiAuto
  - type: SpeedModifiedOnWield
    walkModifier: 1
    sprintModifier: 1
  - type: StaticPrice
    price: 400
  - type: NFWeaponDetails
    class: weapon-details-class-rifle

- type: entity
  id: ASWeaponFrameBatteryRifleDualOptics
  parent: ASBaseWeaponFrameBatteryRifle
  abstract: true
  components:
  - type: Gun
    minAngle: 1.6
    maxAngle: 3.1
    angleIncrease: 0.6
    angleDecay: 1
    fireRate: 3.2
    selectedMode: SemiAuto
    availableModes:
    - SemiAuto
    - FullAuto
  - type: NFWeaponDetails
    manufacturer: weapon-details-manufacturer-dual-optics

- type: entity
  id: ASBaseWeaponFramePulseRifle
  parent: [ NFBaseWeaponEncumbranceRifle, BaseWeaponBattery ]
  abstract: true
  components:
  - type: MagazineVisuals
    magState: mag
    steps: 5
    zeroVisible: false
  - type: Gun
    fireRate: 1.5
  - type: BatteryAmmoProvider
    proto: NFPulse
    fireCost: 100
  - type: Battery
    maxCharge: 3000 # 30 shots of 25 heat is already strong as fuck, no way am I giving this the 40'000 of upstream
    startingCharge: 3000


