- type: entity
  id: ASWeaponRifleGarandCeremonial
  parent: [ ASBaseWeaponRifleEnblocChamber30Long , ASBaseWeaponFrameRifleMarksmanAuroraGunsmith ]
  suffix: AS
  name: Garand rifle
  description: |-
    A ceremonial version of an ancient battle rifle, used for parades and honor guards. The bolt carrier is engraved with the words "lest we forget."
  components:
  - type: Gun
    availableModes:
    - SemiAuto
    selectedMode: SemiAuto
  - type: ChamberMagazineAmmoProvider
    autoCycle: true
    autoEject: true
    soundAutoEject:
      path: /Audio/_Goobstation/Weapons/Guns/MagOut/garand_eject.ogg
  - type: Sprite
    sprite: _DV/Objects/Weapons/Guns/Rifles/ceremonial_grand.rsi
  - type: Clothing
    sprite: _DV/Objects/Weapons/Guns/Rifles/ceremonial_grand.rsi

- type: entity
  id: ASWeaponRifleMosinBolt
  parent: [ ASBaseWeaponRifleEnblocChamber30Long, NFBaseWeaponFrameRifleSteelbolt, BaseGunMelee ]
  name: Mosin bolt-action rifle #please do not look upon my wretched creation, my hubris is boundless and my shame is immeasurable
  description: A weapon for hunting, or endless trench warfare. Equipped with bayonet.
  suffix: AS
  components:
  - type: Gun
    fireRate: 0.9
    availableModes:
    - SemiAuto
  - type: ChamberMagazineAmmoProvider
    autoCycle: false
    autoEject: true
    soundAutoEject:
      path: /Audio/Weapons/Guns/Cock/batrifle_cock.ogg
  - type: ItemSlots
    slots:
      gun_magazine:
        name: Magazine
        startingItem: ASSpeedLoaderRifle30Long
        insertSound: /Audio/Weapons/Guns/MagIn/ltrifle_magin.ogg
        ejectSound: /Audio/Weapons/Guns/MagOut/ltrifle_magout.ogg
        priority: 2
        whitelist:
          tags:
          - ASSpeedLoaderRifle30Long
        whitelistFailPopup: gun-magazine-whitelist-fail
      gun_chamber:
        name: Chamber
        startingItem: ASCartridgeRifle30Long
        priority: 1
        whitelist:
          tags:
          - ASCartridgeRifle30Long
  - type: Sprite
    sprite: Objects/Weapons/Guns/Snipers/bolt_gun_wood.rsi
  - type: Clothing
    sprite: Objects/Weapons/Guns/Snipers/bolt_gun_wood.rsi
  - type: AltFireMelee
    attackType: Light

- type: entity
  name: Basilisk-11
  parent: [ NFBaseWeaponRifleAssaultChamber30, NFBaseWeaponFrameRifleAssaultCybersun, BaseC3SyndicateContraband ]
  id: ASWeaponRifleBasilisk
  description: A fearsome state-of-the-art battle rifle often used by Syndicate agents who care more for violence than secrecy.
  components:
  - type: Sprite
    sprite: _Impstation/Objects/Weapons/Guns/Rifles/nemesis.rsi
    layers:
      - state: base
        map: ["enum.GunVisualLayers.Base"]
      - state: mag-0
        map: ["enum.GunVisualLayers.Mag"]
  - type: Clothing
    sprite: _Impstation/Objects/Weapons/Guns/Rifles/nemesis.rsi
  - type: Gun
    fireRate: 5
    burstFireRate: 10
    shotsPerBurst: 3
    burstCooldown: 0.40
    minAngle: 2
    maxAngle: 6
    angleIncrease: 2
    angleDecay: 4
    selectedMode: Burst
    availableModes:
      - SemiAuto
      - Burst
    soundGunshot:
      path: /Audio/_Impstation/Weapons/Guns/Gunshots/nemesis.ogg
  - type: ChamberMagazineAmmoProvider
    soundRack:
      path: /Audio/Weapons/Guns/Cock/batrifle_cock.ogg
    boltClosed: null
  - type: ItemSlots
    slots:
      gun_magazine:
        name: Magazine
        startingItem: ASMagazineBRTopMountedRifle30
        insertSound: /Audio/Weapons/Guns/MagIn/batrifle_magin.ogg
        ejectSound: /Audio/Weapons/Guns/MagOut/batrifle_magout.ogg
        priority: 2
        whitelist:
          tags:
            - ASMagazineBRTopMountedRifle30
        whitelistFailPopup: gun-magazine-whitelist-fail
  - type: MagazineVisuals
    magState: mag
    steps: 1
    zeroVisible: true
  - type: Appearance