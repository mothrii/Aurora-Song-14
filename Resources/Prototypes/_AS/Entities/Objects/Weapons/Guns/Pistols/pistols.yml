#region Den
- type: entity
  id: ASWeaponPistolBRDIP15BSO
  parent: [ NFBaseWeaponPistolChamber35, ASBaseWeaponFramePistolBeckerSchulz ]
  name: BRDIP-15(B)
  suffix: AS
  description: A rugged and reliable handgun, outfitted with a heavy muzzle counterweight. Favoured by special forces and well-off security personnel.
  components:
  - type: Gun
    burstFireRate: 15
    shotsPerBurst: 3
    burstCooldown: 1
    selectedMode: SemiAuto
    availableModes:
    - SemiAuto
    - Burst
  - type: Tag
    tags:
    - BRDIP_15
    - Sidearm
  - type: Sprite
    sprite: _DEN/Objects/Weapons/Guns/Pistols/BRDIP_15.rsi
    layers:
    - state: base
      map: [ "enum.GunVisualLayers.Base" ]
    - state: mag-0
      map: [ "enum.GunVisualLayers.Mag" ]
  - type: Clothing
    sprite: _DEN/Objects/Weapons/Guns/Pistols/BRDIP_15.rsi
  - type: ItemSlots # It has its own special magazines
    slots:
      gun_magazine:
        name: Magazine
        startingItem: MagazineBRDIP15
        insertSound: /Audio/Weapons/Guns/MagIn/pistol_magin.ogg
        ejectSound: /Audio/Weapons/Guns/MagOut/pistol_magout.ogg
        priority: 2
        whitelist:
          tags:
          - MagazineBRDIP15
        whitelistFailPopup: gun-magazine-whitelist-fail
      gun_chamber:
        name: Chamber
        startingItem: NFCartridgePistol35
        priority: 1
        whitelist:
          tags:
          - NFCartridgePistol35

- type: entity
  id: ASWeaponPistolBRDIP15
  parent: [ ASWeaponPistolBRDIP15BSO ]
  name: BRDIP-15
  suffix: AS
  components:
  - type: Sprite
    sprite: _DEN/Objects/Weapons/Guns/Pistols/BRDIP_15_standard.rsi
    layers:
    - state: base
      map: ["enum.GunVisualLayers.Base"]
    - state: mag-0
      map: ["enum.GunVisualLayers.Mag"]
  - type: Clothing
    sprite: _DEN/Objects/Weapons/Guns/Pistols/BRDIP_15_standard.rsi
