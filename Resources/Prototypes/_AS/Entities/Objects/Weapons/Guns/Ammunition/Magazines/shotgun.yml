- type: entity
  id: BaseMagazineShotgunLever
  name: "magazine (8 gauge)"
  parent: [BaseItem]
  abstract: true
  components:
  - type: Tag
    tags:
    - MagazineShotgunLever
  - type: BallisticAmmoProvider
    mayTransfer: true
    whitelist:
      tags:
      - ShellShotgun8g
    proto: AS8gShellBuckshot
    capacity: 8
  - type: Item
    size: Small
  - type: ContainerContainer
    containers:
      ballistic-ammo: !type:Container
  - type: Sprite
    sprite: Objects/Weapons/Guns/Ammunition/Magazine/LightRifle/light_rifle_mag.rsi
    layers:
    - state: base
      map: ["enum.GunVisualLayers.Base"]
    - state: mag-1
      map: ["enum.GunVisualLayers.Mag"]
  - type: MagazineVisuals
    magState: mag
    steps: 9
    zeroVisible: false
  - type: Appearance

- type: entity
  id: MagazineShotgunLever
  name: "en-bloc (8 gauge)"
  parent: [BaseMagazineShotgunLever]
  components:
  - type: Tag
    tags:
    - MagazineShotgunLever
  - type: Sprite
    sprite: _Goobstation/Objects/Weapons/Guns/Ammunition/Magazine/lever_rifle_mags.rsi

- type: entity
  id: MagazineShotgunLeverEmpty
  parent: MagazineShotgunLever
  suffix: Empty
  components:
  - type: BallisticAmmoProvider
    proto: null
