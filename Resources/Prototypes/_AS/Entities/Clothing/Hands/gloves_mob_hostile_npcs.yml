# Gloves with a fake Lecter visual for hostile NPCs.
- type: entity
  parent: ClothingHandsGlovesColorBlackSMG
  id: ClothingHandsGlovesColorBlackLecter
  name: combat gloves
  suffix: lect
  description: Some gloves with reinforced knuckles and a sleek design, perfect for combat situations.
  categories: [HideSpawnMenu]
  components:
  - type: Sprite
    sprite: Clothing/Hands/Gloves/Color/color.rsi
    layers:
    - state: icon
      color: "#535353"
  - type: Clothing
    clothingVisuals:
      gloves:
      - sprite: Clothing/Hands/Gloves/Color/color.rsi
        state: equipped-HAND
        color: "#535353"
      - sprite: _NF/Objects/Weapons/Guns/Rifles/lecter.rsi
        state: inhand-left

