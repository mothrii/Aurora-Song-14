# Aurora's Song - Military Surplus Suit
- type: entity
  parent: [ClothingOuterHardsuitBaseNF, BaseC2Contraband]
  id: ClothingOuterHardsuitMilitarySurplus
  name: military surplus hardsuit
  description: Auroran MilSurp hardsuit, with advanced features removed. Designed for heavy combat engagements.
  components:
  - type: Sprite
    sprite: _AS/Clothing/OuterClothing/Hardsuits/military_surplus.rsi
  - type: Clothing
    sprite: _AS/Clothing/OuterClothing/Hardsuits/military_surplus.rsi
    clothingVisuals:
      outerClothing:
      - state: equipped-OUTERCLOTHING
  - type: PressureProtection
    highPressureMultiplier: 0.05
    lowPressureMultiplier: 1000
  - type: ExplosionResistance
    damageCoefficient: 0.5
  - type: StaminaResistance
    damageCoefficient: 0.75
  - type: Armor
    modifiers:
      coefficients:
        Blunt: 0.5
        Slash: 0.5
        Piercing: 0.5
        Heat: 0.5
        Radiation: 0.5
        Caustic: 0.5
  - type: Item
    size: Huge
  - type: ClothingSpeedModifier
    walkModifier: 0.9
    sprintModifier: 0.9
  - type: HeldSpeedModifier
  - type: ToggleableClothing
    clothingPrototype: ClothingHeadHelmetHardsuitMilitarySurplus
  - type: Tag
    tags:
    - Hardsuit
    - WhitelistChameleon

