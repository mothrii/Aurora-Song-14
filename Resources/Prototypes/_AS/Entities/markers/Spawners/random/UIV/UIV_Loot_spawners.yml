  table: !type:GroupSelector
    children:
    - !type:GroupSelector
      weight: 99.9
      children:
      - !type:NestedSelector
        tableId: DungeonLootNanoTrasenUIVSuitCommon
        weight: 50
      - !type:NestedSelector
        tableId: DungeonLootNanoTrasenUIVSuitUncommon
        weight: 40
      - !type:NestedSelector
        tableId: DungeonLootNanoTrasenUIVSuitRare
        weight: 10
    # 0.1% chance of the mythical damaged DS hardsuit, which is functionally a Jugsuit with slightly better movement speed
