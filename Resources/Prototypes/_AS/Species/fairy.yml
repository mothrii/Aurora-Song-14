- type: species
  id: Fairy
  name: species-name-fairy
  roundStart: true
  prototype: MobFairy
  sprites: MobHumanSprites
  markingLimits: MobFairyMarkingLimits
  dollPrototype: AppearanceFairy
  skinColoration: HumanAnimal # Aurora's Song - Replaced with HumanAnimal
  maleFirstNames: names_fairy_first
  femaleFirstNames: names_fairy_first
  lastNames: names_fairy_last
  minHeight: 0.35
  maxHeight: 0.4
  minWidth: 0.35
  maxWidth: 0.4

- type: markingPoints
  id: MobFairyMarkingLimits
  points:
    Special: # the cat ear joke
      points: 0
      required: false
    Hair:
      points: 1
      required: false
    FacialHair:
      points: 1
      required: false
    Snout:
      points: 1
      required: false
    Tail: # the cat tail joke
      points: 1 # Aurora Song: You can have a tail. As a treat
      required: true
      defaultMarkings: [ MothWingsDefault ]
    HeadTop:
      points: 1
      required: false
    UndergarmentTop:
      points: 1
      required: false
    UndergarmentBottom:
      points: 1
      required: false
    Chest:
      points: 2
      required: false
    Legs:
      points: 8 # imp 2<8
      required: false
    Arms:
      points: 8 # imp 2<8
      required: false

- type: humanoidBaseSprite
  id: MobFairyEyes
