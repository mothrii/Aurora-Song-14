- type: entity
  parent: BaseItem
  id: NanoTrasenBackpackLoot
  name: NT officer backpack
  description: LOOT! LOOT! LOOT!
  abstract: true
  categories: [HideSpawnMenu]
  suffix: NPC Loot
  components:
  - type: Sprite
    sprite: Clothing/Back/Backpacks/security.rsi
    state: icon
  - type: Clothing
    sprite: Clothing/Back/Backpacks/security.rsi
    quickEquip: false
    slots:
    - back
  - type: Item
    size: Normal
  - type: SpawnItemsOnUse
    items:
    - id: SpaceCash10
    sound:
      path: /Audio/Items/jumpsuit_equip.ogg

