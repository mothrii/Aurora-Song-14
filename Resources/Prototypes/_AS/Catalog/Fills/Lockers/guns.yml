#region Medical
#medical gun safe Fill
- type: entity
  parent: GunSafe
  id: GunSafeMedical
  suffix: Filled, Medical
  components:
  - type: AccessReader
    access: [["Medical"]]
  - type: EntityTableContainerFill
    containers:
      entity_storage: !type:NestedSelector
        tableId: FillGunSafeMedical

- type: entityTable
  id: FillGunSafeMedical
  table: !type:AllSelector
    children:
    - id: NFWeaponShotgunKammerer
    - id: NFAmmunitionBoxShellShotgunBuckshot
    - id: NFAmmunitionBoxShellShotgunBeanbag
#medical gun safe Fill x2
- type: entity
  parent: GunSafe
  id: GunSafeMedical2
  suffix: Filled, Medical, x2
  components:
  - type: AccessReader
    access: [["Medical"]]
  - type: EntityTableContainerFill
    containers:
      entity_storage: !type:NestedSelector
        tableId: FillGunSafeMedical2

- type: entityTable
  id: FillGunSafeMedical2
  table: !type:AllSelector
    children:
    - id: NFWeaponShotgunKammerer
    - id: NFWeaponShotgunKammerer
    - id: NFAmmunitionBoxShellShotgunBuckshot
    - id: NFAmmunitionBoxShellShotgunBuckshot
    - id: NFAmmunitionBoxShellShotgunBeanbag
    - id: NFAmmunitionBoxShellShotgunBeanbag

#region SLE

#SLE mk58-S gun safe Fill
- type: entity
  parent: [GunSafeBaseSecure, BaseC2ContrabandUnredeemable ]
  id: ASGunSafePistolMk58S
  name: mk58-S safe
  suffix: Filled, mk58-S
  components:
  - type: EntityTableContainerFill
    containers:
      entity_storage: !type:NestedSelector
        tableId: ASFillGunSafePistolMk58S

- type: entityTable
  id: ASFillGunSafePistolMk58S
  table: !type:AllSelector
    children:
    - id: ASWeaponPistolMk58S
      amount: 4
    - id: ASWeaponPistolMk58SLessLethal
      amount: 4
    - id: NFMagazinePistol35
      amount: 8
    - id: NFMagazinePistol35Rubber
      amount: 8

