# Wood tables
- type: constructionGraph
  id: N14TableWood
  start: start
  graph:
    - node: start
      actions:
        - !type:DestroyEntity {}
      edges:
        - to: TableCounterBar
          completed:
            - !type:SnapToGrid
          conditions:
            - !type:EntityAnchored {}
          steps:
            - material: WoodPlank
              amount: 1
              doAfter: 2
            - material: MetalRod
              amount: 2
        - to: TableWoodRound
          completed:
            - !type:SnapToGrid
          conditions:
            - !type:EntityAnchored {}
          steps:
            - material: WoodPlank
              amount: 1
              doAfter: 2
            - material: MetalRod
              amount: 2
        - to: TableWoodSquare
          completed:
            - !type:SnapToGrid
          conditions:
            - !type:EntityAnchored {}
          steps:
            - material: WoodPlank
              amount: 1
              doAfter: 2
            - material: MetalRod
              amount: 2
        - to: TableWoodStand
          completed:
            - !type:SnapToGrid
          conditions:
            - !type:EntityAnchored {}
          steps:
            - material: WoodPlank
              amount: 2
              doAfter: 2
        - to: TableWoodCabledrum
          completed:
            - !type:SnapToGrid
          conditions:
            - !type:EntityAnchored {}
          steps:
            - material: WoodPlank
              amount: 4
              doAfter: 2
        - to: TableWoodSettler
          completed:
            - !type:SnapToGrid
          conditions:
            - !type:EntityAnchored {}
          steps:
            - material: WoodPlank
              amount: 2
              doAfter: 2

    - node: TableCounterBar
      entity: N14TableCounterBar
      edges:
        - to: start
          completed:
            - !type:SpawnPrototype
              prototype: MaterialWoodPlank1
              amount: 1
            - !type:SpawnPrototype
              prototype: PartRodMetal1
              amount: 2
          steps:
            - tool: Prying
              doAfter: 2

    - node: TableWoodRound
      entity: N14TableWoodRound
      edges:
        - to: start
          completed:
            - !type:SpawnPrototype
              prototype: MaterialWoodPlank1
              amount: 1
            - !type:SpawnPrototype
              prototype: PartRodMetal1
              amount: 2
          steps:
            - tool: Prying
              doAfter: 2

    - node: TableWoodSquare
      entity: N14TableWoodSquare
      edges:
        - to: start
          completed:
            - !type:SpawnPrototype
              prototype: MaterialWoodPlank1
              amount: 1
            - !type:SpawnPrototype
              prototype: PartRodMetal1
              amount: 2
          steps:
            - tool: Prying
              doAfter: 2

    - node: TableWoodStand
      entity: N14TableWoodStand
