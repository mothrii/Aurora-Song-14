          completed:
            - !type:SpawnPrototype
              prototype: MaterialWoodPlank1
              amount: 2
          steps:
            - tool: Prying
              doAfter: 2

    - node: TableWoodCabledrum
      entity: N14TableWoodCabledrum
      edges:
        - to: start
          completed:
            - !type:SpawnPrototype
              prototype: MaterialWoodPlank1
              amount: 4
          steps:
            - tool: Prying
              doAfter: 2

    - node: TableWoodSettler
