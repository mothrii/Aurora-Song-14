# Metal tables
- type: constructionGraph
  id: N14TableMetal
  start: start
  graph:
    - node: start
      edges:
        - to: TableMetalGrate
          completed:
            - !type:SnapToGrid
          conditions:
            - !type:EntityAnchored {}
          steps:
            - material: Steel
              amount: 2
              doAfter: 2
            - material: MetalRod
              amount: 4
        - to: TableMetalRound
          completed:
            - !type:SnapToGrid
              southRotation: true
          conditions:
            - !type:EntityAnchored {}
          steps:
            - material: Steel
              amount: 2
              doAfter: 2

    - node: TableMetalGrate
      entity: N14TableMetalGrate
      edges:
        - to: start
          completed:
            - !type:SpawnPrototype
              prototype: SheetSteel1
              amount: 2
            - !type:SpawnPrototype
              prototype: PartRodMetal1
              amount: 4
          steps:
            - tool: Anchoring
              doAfter: 2

    - node: TableMetalRound
      entity: N14TableMetalRound
      edges:
        - to: start
          completed:
            - !type:SpawnPrototype
              prototype: SheetSteel1
              amount: 2
          steps:
            - tool: Anchoring
              doAfter: 2

