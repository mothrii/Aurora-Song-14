- type: entity
  parent: DrinkBottleGlassBaseFull
  id: BaseOilJar
  abstract: true
  components:
  - type: Sprite
    sprite: Nyanotrasen/Objects/Consumable/Drinks/oil_jar.rsi
    state: icon
    layers:
      - state: icon
        map: ["drinkCanIcon"]
  - type: Appearance
  - type: GenericVisualizer
    visuals:
      enum.OpenableVisuals.Opened:
        drinkCanIcon:
          True: {state: "icon_open"}
          False: {state: "icon"}

- type: entity
  parent: BaseOilJar
  id: OilJarGhee
  name: jar of ghee
  description: A large tinted glass jar with a simple label of butter sticks on it.
  components:
  - type: Sprite
    layers:
      - state: icon
        map: ["drinkCanIcon"]
      - state: butter
  - type: Solution # Aurora's Song - Convert to solution
    solution:
      reagents:
      - ReagentId: OilGhee
        Quantity: 120

- type: entity
  parent: BaseOilJar
  id: OilJarCorn
  name: jar of vegetable oil # Frontier: corn<vegetable
  description: A large tinted glass jar with a simple label of a corn stalk on it.
  components:
  - type: Sprite
    layers:
      - state: icon
        map: ["drinkCanIcon"]
      - state: corn
  - type: Solution # Aurora's Song - Convert to solution
    solution:
      reagents:
      - ReagentId: Cornoil
        Quantity: 120

- type: entity
  parent: BaseOilJar
  id: OilJarOlive
  name: jar of olive oil
  description: A large tinted glass jar with a simple label of olives on it.
  components:
  - type: Sprite
    layers:
      - state: icon
        map: ["drinkCanIcon"]
      - state: olives
  - type: Solution # Aurora's Song - Convert to solution
    solution:
      reagents:
      - ReagentId: OilOlive
        Quantity: 120
