# N14TODO: Change bases to have wood, metal, 64x and storage and use inheritance. So that desks have 10 storage.
# Aurora's Song | Replaced names and descriptions with locale strings
- type: entity
  id: N14FreeTableBase # Base off this for metal tables
  parent: BaseStructure
  abstract: true
  components:
  - type: Damageable
    damageModifierSet: Metallic
  - type: Injurable # Aurora's Song - Extract damageContainer to Injurable
    damageContainer: Inorganic
  - type: Destructible
    thresholds:
    - trigger:
        !type:DamageTrigger
        damage: 100
      behaviors:
      - !type:PlaySoundBehavior
        sound:
          collection: WoodDestroy
      - !type:SpawnEntitiesBehavior
        spawn:
          SheetSteel1:
            min: 1
            max: 1
      - !type:DoActsBehavior
        acts: ["Destruction"]
  - type: PlaceableSurface
  - type: Fixtures
    fixtures:
      fix1:
        shape:
          !type:PhysShapeAabb
          bounds: "-0.45,-0.45,0.45,0.45"
        density: 55
        mask: # tables should collide with other tables
        - TableMask
        layer:
        - TableLayer
  - type: Sprite
    netsync: false
  - type: Climbable
  - type: Bonkable
    bonkDamage:
      types:
        Blunt: 4
  - type: Clickable

