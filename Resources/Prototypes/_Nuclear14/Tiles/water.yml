# Aurora's Song | replaced names and descriptions with locale stringe
- type: entity
  parent: [SolutionTank, SolutionTile] # Aurora's Song - Convert to solution
  id: N14FloorWaterDirtyEntity
  placement:
    mode: SnapgridCenter
    snap:
    - Wall
  components:
  - type: FloorOccluder
  - type: Transform
    anchored: true
  - type: SyncSprite
  - type: Clickable
  - type: Sprite
    sprite: Tiles/Planet/water.rsi
    drawdepth: BelowFloor
    layers:
      - state: shoreline_water
  - type: Solution # Aurora's Song - Convert to solution
    solution:
      reagents:
      - ReagentId: Water
        Quantity: 7680
  - type: SolutionRegeneration # Aurora's Song - Add regeneration
    generated:
      reagents:
      - ReagentId: Water
        Quantity: 1
  - type: DrainableSolution
    solution: tank # Aurora's Song - pool>tank
  - type: SpeedModifierContacts
    walkSpeedModifier: 0.5
    sprintSpeedModifier: 0.5
  - type: Physics
    bodyType: Static
  - type: Fixtures
    fixtures:
      fix1:
        shape:
          !type:PhysShapeAabb
          bounds: "-0.5,-0.5,0.5,0.5"
        layer:
          - SlipLayer
        mask:
          - ItemMask
        density: 1000
        hard: false
  - type: FootstepModifier
    footstepSoundCollection:
      collection: N14FootstepWater
      params:
        volume: 8


