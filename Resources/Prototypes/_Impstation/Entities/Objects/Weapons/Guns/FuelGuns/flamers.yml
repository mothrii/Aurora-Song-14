  id: WeaponFlamerXiuhcoatl
  description: Simple as it is deadly, the Xiuhcoatl fulfills a long-standing craving of the Gorlex Marauders for Nanotrasen Barbeque.
  components:
  - type: Sprite
    sprite: _Impstation/Objects/Weapons/Guns/FuelGuns/xiuhcoatl.rsi
  - type: Clothing
    sprite: _Impstation/Objects/Weapons/Guns/FuelGuns/xiuhcoatl.rsi
  - type: Appearance
  - type: Item
    sprite: _Impstation/Objects/Weapons/Guns/FuelGuns/xiuhcoatl.rsi
  - type: MagazineVisuals
    magState: mag
    steps: 5
    zeroVisible: true
  - type: Solution # Aurora's Song - Solution refactor
    solution:
      reagents:
      - ReagentId: WeldingFuel
        Quantity: 600
      maxVol: 600 #25 seconds of flaming
  - type: SolutionAmmoProvider
    solutionId: chamber
    proto: BulletFlamethrower
    fireCost: 3
  - type: ExaminableSolution
    solution: chamber
  - type: SolutionItemStatus
    solution: chamber
  - type: SolutionRefuel
    fuelSolutionName: chamber
    fuelReagent: WeldingFuel
  - type: Tag
    tags:
    - WeldingTool
