- type: reagent 
  id: Burnchamber
  name: reagent-name-burnchamber
  parent: BaseAlcohol
  desc: reagent-desc-burnchamber
  physicalDesc: reagent-physical-desc-burning
  flavor: burnchamber
  color: "#FFC503"
  metamorphicSprite:
    sprite: _Impstation/Objects/Consumable/Drinks/burnchamber.rsi
    state: icon_empty
  metamorphicMaxFillLevels: 3
  metamorphicFillBaseName: fill-
  metamorphicChangeColor: false
  metabolisms:
    # Aurora's Song Start - digestion fix
    Digestion:
      metabolites:
        Ethanol: 0.15
    # Aurora's Song End
      effects:
      - !type:SatiateThirst
        factor: 2
    # Aurora's Song - Remove Posion Category
      - !type:AdjustTemperature
        amount: 250 # thermal energy, not temp
      - !type:HealthChange
          conditions:
          - !type:ReagentCondition # Aurora's Song - ReagentThreshold>ReagentCondition
            reagent: Burnchamber # Aurora's Song - specify reagent
            min: 10
          damage:
            types:
              Heat: .5
      - !type:PopupMessage
        type: Local
        messages: [ "capsaicin-effect-light-burn" ]
        probability: 0.2
  fizziness: .5

