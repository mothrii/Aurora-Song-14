- type: reagent
  id: CottonBool
  name: reagent-name-cottonbool
  parent: BaseAlcohol
  desc: reagent-desc-cottonbool
  physicalDesc: reagent-physical-desc-fibrous
  flavor: cottonbool
  color: "#fff0e3"
  recognizable: true
  metamorphicSprite:
    sprite: Objects/Consumable/Drinks/thin_glass.rsi
    state: icon_empty
  metamorphicMaxFillLevels: 5
  metamorphicFillBaseName: fill-
  metamorphicChangeColor: true
  metabolisms:
    Digestion: # Aurora's Song - Drink>Digestion
      effects:
      - !type:SatiateThirst
        factor: 4
      - !type:SatiateHunger
        conditions:
        - !type:MetabolizerTypeCondition # Aurora's Song - OrganType>MetabolizerTypeCondition
          type: [ Moth ] # Aurora's Song - add brackets 
        factor: 4
      - !type:Emote
        conditions:
        - !type:MetabolizerTypeCondition # Aurora's Song - OrganType>MetabolizerTypeCondition
          type: [ Moth ] # Aurora's Song - add brackets
        emote: Squeak
        showInChat: true
        force: true
        probability: 0.35
    Bloodstream: # Aurora's Song - Medicine>Bloodstream
      effects:
      - !type:ModifyBleed # Aurora's Song - ModifyBleedAmount>ModifyBleed
        amount: -0.75
  fizziness: .1

- type: reagent
  id: StarryNight
  name: reagent-name-starrynight
  parent: BaseAlcohol
  desc: reagent-desc-starrynight
  physicalDesc: reagent-physical-desc-inky
  flavor: paintthinner
  color: "#080e17"
  metamorphicSprite:
    sprite: _Impstation/Objects/Consumable/Drinks/starrynight.rsi
    state: icon_empty
  metamorphicMaxFillLevels: 4
  metamorphicFillBaseName: fill-
  metamorphicChangeColor: false
  metabolisms:
    Digestion: # Aurora's Song - Drink>Digestion
      effects:
      - !type:SatiateThirst
        factor: 5
      - !type:Emote
        conditions:
        - !type:ReagentCondition # Aurora's Song - ReagentThreshold>ReagentCondition
