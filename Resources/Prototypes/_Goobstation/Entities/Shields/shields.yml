- type: entity
  name: greatshield
  parent: [BaseItem, ClothingSlotBase, BaseC3NanoTrasenContrabandLowValue] # Aurora's Song | Contraband adjusted
  id: BlueShieldShield
  description: The iconic namesake of these soldiers, the Blueshield. Known to take shots meant for high-ranking officials.
  components:
    - type: ContainerContainer
    - type: ItemToggle
      predictable: false
      soundActivate:
        path: /Audio/_Goobstation/Weapons/Effects/nanotrasenenergyon.ogg
      soundDeactivate:
        path: /Audio/_Goobstation/Weapons/Effects/nanotrasenenergyoff.ogg
      soundFailToActivate:
        path: /Audio/Machines/button.ogg
        params:
          variation: 0.250
    - type: ItemToggleActiveSound
      activeSound:
        path: /Audio/_Goobstation/Weapons/Effects/nanotrasenenergyhum.ogg
    - type: ItemToggleSize
      activatedSize: Ginormous
    - type: Clothing
      sprite: _Goobstation/Objects/Shields/blueshieldshield.rsi
      quickEquip: false
      slots:
#      - Belt #Den
      - Back #Den
      - suitStorage #Den
      clothingVisuals: #TheDen, Suitstorage and Backpack sprites.
        suitstorage:
        - state: equipped-SUITSTORAGE
        back:
        - state: equipped-BACKPACK
    - type: ComponentToggler
      components:
      - type: DisarmMalus
        malus: 1
    - type: Sprite
      sprite: _Goobstation/Objects/Shields/blueshieldshield.rsi
      layers:
        - state: icon
        - state: icon-on
          color: "#FFFFFF"
          visible: false
          shader: unshaded
          map: [ "shield" ]
    - type: Item
      size: Large
    - type: UseDelay
      delay: 0.5
    - type: ToggleableVisuals
      spriteLayer: shield
      inhandVisuals:
        left:
          - state: inhand-left-on
            shader: unshaded
        right:
          - state: inhand-right-on
            shader: unshaded
      clothingVisuals: #TheDen, Suitstorage and Backpack sprites.
        suitstorage:
        - state: equipped-SUITSTORAGE-on
          shader: unshaded
        back:
        - state: equipped-BACKPACK-on
          shader: unshaded
    - type: PointLight
      netsync: false
      enabled: false
      radius: 2 #TheDen
      energy: 2 #TheDen
      color: "#678AD9"
    - type: ItemTogglePointLight
    - type: Blocking
      passiveBlockFraction: 0.7
      passiveBlockModifier:
        coefficients:
          Blunt: 1
          Slash: 1
          Piercing: 1
          Heat: 1
      activeBlockModifier:
        coefficients:
          Blunt: 0.7
          Slash: 0.7
          Piercing: 0.7
          Heat: 0.7
        flatReductions:
          Heat: 3
          Blunt: 3
          Slash: 3
          Piercing: 3
    - type: Reflect # Aurora's Song - adjust Greatshield to be highest tier of E-Shield
      reflectProb: 0.9
      damageOnReflectModifier: 0.6
      reflects:
      - Energy
    - type: Appearance
    - type: Injurable # Aurora's Song - Damageable>Injurable
      damageContainer: Shield
    - type: Battery
      maxCharge: 180
      startingCharge: 180
    - type: BatterySelfRecharger
      autoRechargeRate: 5
      autoRechargePauseTime: 10
    - type: RechargeableBlocking
    - type: ItemSlots
      slots:
        item:
          name: Baton
          insertVerbText: sheath-insert-verb
          ejectVerbText: sheath-eject-verb
          insertSound: /Audio/Items/sheath.ogg
          ejectSound: /Audio/Items/unsheath.ogg
          whitelist:
            tags:
            - Baton # Aurora's Song | Corrected to use new tag that is more generic for anything baton shaped
            - Truncheon # Aurora's Song | Added existing Truncheon tag so you can store that too
    #- type: EmpImmune # The battery aspect is, as far as I know, used as an easily healable way to monitor the shields health, but if energy shields do not get emped, these should not either.
    - type: StaticPrice #Aurora's Song | Give these things a larger value for the vend to grab
      price: 1000
