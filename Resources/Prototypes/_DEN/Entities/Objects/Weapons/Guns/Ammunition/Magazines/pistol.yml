- type: entity
  id: BaseMagazineBRDIP15
  name: "BRDI P-15 magazine (.35 auto)"
  parent: BaseMagazinePistol
  abstract: true
  components:
  - type: Tag
    tags:
      - MagazineBRDIP15
  - type: BallisticAmmoProvider
    whitelist:
      tags:
        - NFCartridgePistol35
    proto: NFCartridgePistol35
    mayTransfer: true
    capacity: 15
  - type: Item
    size: Small
  - type: Sprite
    sprite: _DEN/Objects/Weapons/Guns/Ammunition/Magazine/CaselessRifle/BRDIP_15_mag.rsi
    layers:
    - state: base
      map: ["enum.GunVisualLayers.Base"]
    - state: mag-1
      map: ["enum.GunVisualLayers.Mag"]
  - type: MagazineVisuals
    magState: mag
    steps: 12
    zeroVisible: false
  - type: Appearance

