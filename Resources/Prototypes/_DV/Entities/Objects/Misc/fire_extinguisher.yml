- type: entity
  name: bluespace fire extinguisher
  parent: [SolutionLarge, FireExtinguisher] # Aurora's Song - Use SolutionLarge
  id: FireExtinguisherBluespace
  description: An experimental fire extinguisher that uses bluespace technology to gradually refill itself. The faint blue glow is only slightly disconcerting.
  components:
  - type: Sprite
    sprite: _DV/Objects/Misc/fire_extinguisher_bluespace.rsi
    layers:
    - state: fire_extinguisher_closed
      map: [ "enum.ToggleableVisuals.Layer" ] # Frontier: Enum changes from Wizden#35341
  - type: Item
    sprite: _DV/Objects/Misc/fire_extinguisher_bluespace.rsi
    size: Normal
  - type: Solution # Aurora's Song - Convert to solution
    solution:
      reagents:
      - ReagentId: Water
        Quantity: 240
  - type: PhysicalComposition
    materialComposition:
      Steel: 80
      Bluespace: 20
  - type: SolutionRegeneration # Aurora's Song - Removed solution property
    generated:
      reagents:
      - ReagentId: Water
        Quantity: 10
    duration: 10
