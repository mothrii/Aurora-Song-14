- type: entity
  parent: BaseSpeciesAppearance
  id: AppearanceHarpy
  name: harpy appearance
  components:
  - type: Inventory
    speciesId: harpy
    displacements:
      jumpsuit:
        sizeMaps:
          32:
            sprite: _DV/Mobs/Species/Harpy/displacement.rsi
            state: jumpsuit
    femaleDisplacements: {} # Frontier: female jumpsuit displacement
  - type: EntityTableContainerFill
    containers:
      body_organs: !type:AllSelector
        children:
        - id: OrganHarpyTorso
        - id: OrganHarpyHead
        - id: OrganHarpyArmLeft
        - id: OrganHarpyArmRight
        - id: OrganHarpyHandRight
        - id: OrganHarpyHandLeft
        - id: OrganHarpyLegLeft
        - id: OrganHarpyLegRight
        - id: OrganHarpyFootLeft
        - id: OrganHarpyFootRight
        - id: OrganHumanBrain
        - id: OrganHumanEyes
        - id: OrganHumanTongue
        - id: OrganHumanAppendix
        - id: OrganHumanEars
        - id: OrganHarpyLungs
        - id: OrganHumanHeart
        - id: OrganAnimalStomach
        - id: OrganAnimalLiver
        - id: OrganAnimalKidneys
  - type: HumanoidAppearance
    species: Harpy
    hideLayersOnEquip:
    - Hair
    - Snout
  - type: Sprite
    scale: 0.9, 0.9

- type: entity
  parent:
  - AppearanceHarpy
  - BaseSpeciesMobOrganic # starcup: changed from BaseMobHuman for consistency
  id: MobHarpy
  name: Urist McHarpy
  components:
  - type: NpcFactionMember
    factions:
    - NanoTrasen
    - Harpy # Frontier
  - type: HarpySinger
  - type: Instrument
    allowPercussion: false
    program: 52
  - type: SwappableInstrument
    instrumentList:
      "Voice": {52: 0}
      "Trumpet": {56: 0}
      "Electric": {27: 0}
      "Bass": {33: 0}
      "Rock": {29: 0}
      "Acoustic": {24: 0}
      "Flute": {73: 0}
      "Sax": {66: 0}
      "Piano": {1: 0}
      "Church Organ": {19: 0}
      "Harp": {46: 0}
    onlySetBySelf: true # Frontier
  - type: UserInterface
    interfaces:
      enum.InstrumentUiKey.Key:
        type: InstrumentBoundUserInterface
      enum.HumanoidMarkingModifierKey.Key:
        type: HumanoidMarkingModifierBoundUserInterface
      enum.StrippingUiKey.Key:
        type: StrippableBoundUserInterface
  - type: Fixtures
    fixtures: # TODO: This needs a second fixture just for mob collisions.
      fix1:
        shape:
          !type:PhysShapeCircle
          radius: 0.32
        density: 90
        restitution: 0.0
        mask:
        - MobMask
        layer:
        - MobLayer
  - type: Damageable
    damageModifierSet: Harpy
  - type: MeleeWeapon
    soundHit:
      collection: AlienClaw
    animation: WeaponArcClaw
    damage:
      types:
        Piercing: 5
  - type: Speech
    speechSounds: Harpy
    speechVerb: Harpy
    allowedEmotes: ['Meow', 'Hiss', 'Mew', 'Purr', 'Growl', 'Bark', 'Snarl', 'Whine', 'Howl', 'Awoo', 'Honk', 'HarpyRing', 'HarpyPew', 'HarpyBang', 'Beep', 'HarpyRev', 'HarpyCaw', 'Squish', 'Chitter', 'Chirp', 'Squeak', 'Click'] # Aurora's Song - Remove Harpy in front of unified emotes
  - type: Vocal
    sounds:
      Male: SoundsHarpy
      Female: SoundsHarpy
      Unsexed: SoundsHarpy
  - type: InstrumentVisuals
  - type: GenericVisualizer
    visuals:
      enum.InstrumentVisuals.Playing:
        enum.InstrumentVisuals.Layer:
          False: {visible: false}
          True: {visible: true}
  - type: MovementSpeedModifier
#    baseWalkSpeed: 2.5 # Frontier
#    baseSprintSpeed: 5.0 # Frontier
    weightlessAcceleration: 2.5
  - type: HarpyVisuals
  - type: UltraVision
#  - type: Tag # Frontier
#    tags: # Frontier
#    - CanPilot # Frontier
#    - FootstepSound # Frontier
#    - DoorBumpOpener # Frontier

