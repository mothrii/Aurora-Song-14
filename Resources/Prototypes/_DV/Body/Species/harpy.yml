- type: entity
  parent: [ OrganBaseLungs, OrganHumanInternal, OrganHumanMetabolizer ]
  id: OrganHarpyLungs
  name: lungs
  description: An advanced pair of avian lungs. Filters oxygen by way of moving air constantly through air sacs.
  components:
  - type: Metabolizer
    updateInterval: 2.0
    removeEmpty: true
    solutionOnBody: false
    solution: "Lung"
    groups:
    - id: Gas
      rateModifier: 200.0

- type: entity
  id: ActionHarpyPlayMidi
  parent: BaseAction # Frontier, Wizden#27422 compliance
  name: Play MIDI
  description: Sing your heart out! Right click yourself to set an instrument.
  components:
  - type: Action # Frontier, Wizden#27422 compliance, InstantAction<Action
    checkCanInteract: false
    icon: _DV/Interface/Actions/harpy_sing.png
  - type: InstantAction # Frontier, Wizden#27422 compliance
    event: !type:OpenUiActionEvent
      key: enum.InstrumentUiKey.Key

- type: entity
  id: ActionSyrinxChangeVoiceMask
  parent: BaseAction # Frontier, Wizden#27422 compliance
  name: Set name
  description: Change the name others hear to something else.
  components:
  - type: Action # Frontier, Wizden#27422 compliance, InstantAction<Action
    icon: _DV/Interface/Actions/harpy_syrinx.png
    itemIconStyle: BigAction
  - type: InstantAction # Frontier, Wizden#27422 compliance
    event: !type:VoiceMaskSetNameEvent
