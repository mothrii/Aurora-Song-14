- type: entity
  parent: BaseSpeciesAppearance
  id: AppearanceFeroxi
  name: feroxi appearance
  components:
  - type: Inventory
    speciesId: feroxi
    femaleDisplacements:
      jumpsuit:
        sizeMaps:
          32:
            sprite: Mobs/Species/Human/displacement.rsi
            state: jumpsuit-female
  - type: EntityTableContainerFill
    containers:
      body_organs: !type:AllSelector
        children:
        - id: OrganFeroxiTorso
        - id: OrganFeroxiHead
        - id: OrganFeroxiArmLeft
        - id: OrganFeroxiArmRight
        - id: OrganFeroxiHandRight
        - id: OrganFeroxiHandLeft
        - id: OrganFeroxiLegLeft
        - id: OrganFeroxiLegRight
        - id: OrganFeroxiFootLeft
        - id: OrganFeroxiFootRight
        - id: OrganHumanBrain
        - id: OrganHumanEyes
        - id: OrganHumanTongue
        - id: OrganHumanAppendix
        - id: OrganHumanEars
        - id: OrganFeroxiLungs
        - id: OrganAnimalHeart
        - id: OrganFeroxiStomach
        - id: OrganAnimalLiver
        - id: OrganHumanKidneys
  - type: HumanoidAppearance
    species: Feroxi
    hideLayersOnEquip:
    - Snout
    - SnoutCover
    - HeadTop
    - HeadSide
    - FacialHair
    - Hair

- type: entity
  parent:
  - AppearanceFeroxi
  - BaseSpeciesMobOrganic
  id: MobFeroxi
  name: Urist McFin
  components:
  - type: Thirst
    baseDecayRate: 0.2
  - type: Speech
    speechSounds: Tenor
    speechVerb: Feroxi
    allowedEmotes: [ "Gnash" ]
  - type: Vocal
    sounds:
      Male: MaleFeroxi
      Female: FemaleFeroxi
      Unsexed: MaleFeroxi
  - type: MeleeWeapon
    hidden: true
    soundHit:
      path: /Audio/Effects/bite.ogg
    angle: 30
    animation: WeaponArcBite
    damage:
      types:
        Piercing: 7 # oooh scary extra damage~
  - type: Damageable
    damageModifierSet: Feroxi
  - type: TypingIndicator
    proto: feroxi
  - type: FeroxiDehydrate
    hydratedMetabolizer: Feroxi
    dehydratedMetabolizer: FeroxiDehydrated
    dehydrationThreshold: 150

- type: entity
  parent: OrganBase
  id: OrganFeroxi
  abstract: true
  suffix: Feroxi

- type: entity
  id: OrganFeroxiMetabolizer
  abstract: true
  components:
  - type: Metabolizer
    metabolizerTypes: [ Feroxi, Animal ] # I hope having animal here won't break anything

- type: entity
  parent: OrganFeroxi
  id: OrganFeroxiInternal
  abstract: true
  components:
  - type: Sprite
    sprite: Mobs/Species/Human/organs.rsi

- type: entity
  parent: OrganFeroxi
  id: OrganFeroxiExternal
  abstract: true
  components:
  - type: Sprite
    sprite: _DV/Mobs/Species/Feroxi/parts.rsi # Aurora's Song - Use delta-v sprites

- type: entity
  parent: [ OrganBaseTorso, OrganFeroxiExternal ]
  id: OrganFeroxiTorso

- type: entity
  parent: [ OrganBaseHead, OrganFeroxiExternal ]
  id: OrganFeroxiHead

- type: entity
  parent: [ OrganBaseArmLeft, OrganFeroxiExternal ]
  id: OrganFeroxiArmLeft

- type: entity
  parent: [ OrganBaseArmRight, OrganFeroxiExternal ]
  id: OrganFeroxiArmRight

- type: entity
  parent: [ OrganBaseHandLeft, OrganFeroxiExternal ]
  id: OrganFeroxiHandLeft

- type: entity
  parent: [ OrganBaseHandRight, OrganFeroxiExternal ]
  id: OrganFeroxiHandRight

- type: entity
  parent: [ OrganBaseLegLeft, OrganFeroxiExternal ]
  id: OrganFeroxiLegLeft

- type: entity
  parent: [ OrganBaseLegRight, OrganFeroxiExternal ]
  id: OrganFeroxiLegRight

- type: entity
  parent: [ OrganBaseFootLeft, OrganFeroxiExternal ]
  id: OrganFeroxiFootLeft

- type: entity
  parent: [ OrganBaseFootRight, OrganFeroxiExternal ]
  id: OrganFeroxiFootRight

- type: entity
  parent: [ OrganBaseLungs, OrganHumanInternal, OrganFeroxiMetabolizer ]
  id: OrganFeroxiLungs

- type: entity
  parent: [ OrganBaseStomach, OrganHumanInternal, OrganFeroxiMetabolizer ]
  id: OrganFeroxiStomach
  components:
  - type: Stomach
    specialDigestible:
      tags:
      - ReptilianFood
      - Meat
      - Pill
      - Crayon
